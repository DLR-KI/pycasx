name: Pull Request Labeler

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: 0 1 * * 1

permissions: {}

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true
